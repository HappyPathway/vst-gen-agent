name: Update Device Index

# Fetches all active devices from the live registry and regenerates
# docs/device-index.md with a full browsable table.
# Commits the updated file back to master if it changed.
#
# Required secrets:
#   REGISTRY_URL   — Cloud Run service URL (public endpoint, no key needed for GET)

on:
  schedule:
    - cron: '30 3 * * *'   # 03:30 UTC daily (after revalidation finishes)
  push:
    branches: [master]
    paths:
      - 'api/**'            # re-index after any API change
  workflow_dispatch:

jobs:
  generate-index:
    name: Regenerate docs/device-index.md
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit back

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch all devices from registry
        id: fetch
        run: |
          RESPONSE=$(curl -sf \
            "${{ secrets.REGISTRY_URL }}/devices?limit=200")
          echo "$RESPONSE" > /tmp/devices.json
          TOTAL=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['total'])")
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"

      - name: Generate device-index.md
        run: |
          python3 << 'PYEOF'
          import json, datetime

          with open("/tmp/devices.json") as f:
              data = json.load(f)

          devices = data.get("devices", [])
          now = datetime.datetime.utcnow().strftime("%Y-%m-%d %H:%M UTC")

          lines = [
              "# VST Gen — Community Device Index",
              "",
              f"Auto-generated by GitHub Actions · Last updated: **{now}**",
              f"  \nTotal devices: **{data['total']}**",
              "",
              "> Devices listed here have verified public GitHub repositories.",
              "> Pull any device with: `python3 tools/registry_client.py pull <slug>`",
              "",
              "---",
              "",
              "| Device | Manufacturer | Params | Plugin Repo | Panel |",
              "|--------|-------------|--------|-------------|-------|",
          ]

          for d in sorted(devices, key=lambda x: (x.get("manufacturer",""), x.get("device",""))):
              device      = d.get("device", "")
              mfr         = d.get("manufacturer", "")
              slug        = d.get("slug", "")
              params      = len(d.get("params", []))
              repo        = d.get("github_repo") or ""
              panel_url   = d.get("panel_url") or ""
              clone_url   = d.get("plugin_clone_url") or ""

              repo_cell   = f"[{repo}]({clone_url})" if repo else "—"
              panel_cell  = f"[![panel]({panel_url})]({clone_url})" if panel_url else "—"

              lines.append(
                  f"| **{device}** `{slug}` | {mfr} | {params} | {repo_cell} | {panel_cell} |"
              )

          lines += [
              "",
              "---",
              "",
              "## How to contribute",
              "",
              "1. Capture your device NRPN map: `@vst-gen /new-device`",
              "2. Push the plugin code to a **public** GitHub repo",
              "3. Submit to the registry:",
              "   ```bash",
              "   python3 tools/registry_client.py push nrpn_map.json \\",
              "     --slug your-device-slug \\",
              "     --repo YourOrg/YourPluginRepo",
              "   ```",
              "4. This index updates automatically within 24 hours.",
          ]

          out = "\n".join(lines) + "\n"
          with open("docs/device-index.md", "w") as f:
              f.write(out)

          print(f"Written {len(devices)} devices to docs/device-index.md")
          PYEOF

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/device-index.md
          if git diff --cached --quiet; then
            echo "No changes to device index."
          else
            git commit -m "docs: update device index (${{ steps.fetch.outputs.total }} devices) [skip ci]"
            git push
          fi
